<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portfolio</title>
    <link rel="stylesheet" href="/Assets/CSS/style.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- header section  -->
    <header id="home">
      <nav class="navbar navbar-expand-lg">
        <div class="container">
          <a class="navbar-brand logo" href="index.html"
            >Jane <span>Smith</span></a
          >
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarScroll"
            aria-controls="navbarScroll"
            aria-expanded="false"
            aria-label="Toggle navigation"
          >
            <span class="navbar-toggler-icon"></span>
          </button>

          <div class="collapse navbar-collapse" id="navbarScroll">
            <ul
              class="navbar-nav m-auto my-2 my-lg-0 navbar-nav-scroll"
              style="--bs-scroll-height: 100px"
            >
              <li class="nav-item">
                <a class="nav-link active" aria-current="page" href="index.html"
                  >Home</a
                >
              </li>
              <li class="nav-item">
                <a
                  class="nav-link active"
                  aria-current="page"
                  href="Aboute.html"
                  >About Us</a
                >
              </li>
              <li class="nav-item">
                <a
                  class="nav-link active"
                  aria-current="page"
                  href="Portfolio.html"
                  >Portfolio</a
                >
              </li>
              <li class="nav-item">
                <a
                  class="nav-link active"
                  aria-current="page"
                  href="Service.html"
                  >Services</a
                >
              </li>
              <li class="nav-item">
                <a
                  class="nav-link active"
                  aria-current="page"
                  href="Contact.html"
                  >Contact</a
                >
              </li>
            </ul>
            <form class="d-flex" role="search">
              <input
                class="form-control me-2"
                type="search"
                placeholder="Search"
              />
              <button class="btn btn-outline-success" type="submit">
                Search
              </button>
            </form>
          </div>
        </div>
      </nav>
    </header>

    <!-- main section  -->
    <main>
      <section class="py-5 bg-light">
        <div class="container">
          <!-- a. Page Title -->
          <div class="text-center mb-5">
            <h1 class="fw-bold">Contact Me</h1>
            <p class="text-muted">Feel free to get in touch</p>
            <hr class="w-25 mx-auto" />
          </div>

          <div class="row g-4">
            <!-- b. Contact Info -->
            <div class="col-md-5">
              <div class="p-4 shadow-sm border-0 h-100">
                <h4 class="mb-4">Contact Info</h4>
                <p>Email: example@gmail.com</p>
                <p>Phone: 0123456789</p>
                <p>Address: Dhaka, Bangladesh</p>
              </div>
            </div>

            <!-- c. Contact Form -->
            <div class="col-md-7">
              <div class="p-4 shadow-sm border-0">
                <h4 class="mb-4">Send Message</h4>

                <form id="contactForm">
                  <input
                    class="form-control mb-3"
                    type="text"
                    id="name"
                    placeholder="Name"
                  />
                  <input
                    class="form-control mb-3"
                    type="email"
                    id="email"
                    placeholder="Email"
                  />
                  <input
                    class="form-control mb-3"
                    type="text"
                    id="phone"
                    placeholder="Phone"
                  />
                  <input
                    class="form-control mb-3"
                    type="text"
                    id="address"
                    placeholder="Address"
                  />
                  <textarea
                    class="form-control mb-3"
                    id="message"
                    rows="4"
                    placeholder="Message"
                  ></textarea>

                  <button class="btn btn-dark w-100" type="submit">
                    Send Message
                  </button>
                </form>
              </div>
            </div>
          </div>

          <!-- d. Google Map -->
          <div class="mt-5">
            <iframe
              src="https://maps.google.com/maps?q=dhaka&t=&z=13&ie=UTF8&iwloc=&output=embed"
              width="100%"
              height="300"
            >
            </iframe>
          </div>
        </div>
      </section>
    </main>

    <!-- footer section -->
    <footer class="bg-dark text-white text-center py-4">
      <div class="container">
        <div class="row justify-content-center">
          <div class="col-12">
            <p class="mb-2">
              &copy; 2026 Rupes. All rights reserved.

              <span id="time"> </span>,
              <span id="date" class="mb-2"></span>
            </p>
            <div>
              <a
                href="https://www.facebook.com"
                class="text-white me-3"
                target="_blank"
                >Facebook</a
              >

              <a
                href="https://www.linkedin.com"
                class="text-white me-3"
                target="_blank"
                >LinkedIn</a
              >

              <a
                href="https://www.github.com"
                class="text-white"
                target="_blank"
                >GitHub</a
              >
            </div>
          </div>
        </div>
      </div>
    </footer>

    <script src="/Assets/JS/App.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
